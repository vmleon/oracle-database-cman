---
# Transparent Application Continuity service on both RAC nodes: -failovertype AUTO enables
# TAC, -notification TRUE publishes FAN, -drain_timeout bounds the planned-maintenance grace
# period. Preferred on all instances so CMAN can drain work off one node onto the other.
- name: Create or update the health service with Application Continuity attributes
  ansible.builtin.shell: |
    set -e
    export ORACLE_HOME=$(ls -d /u01/app/oracle/product/*/dbhome_* 2>/dev/null | head -1)
    export PATH=$ORACLE_HOME/bin:$PATH
    DBUN=$(srvctl config database | head -1)
    PDB=$(srvctl config service -db "$DBUN" | awk -F': ' '/Pluggable database name/{print $2; exit}')
    INSTS=$(srvctl status database -db "$DBUN" | awk '/^Instance/{print $2}' | paste -sd,)
    AC="-failovertype AUTO -failover_restore AUTO -commit_outcome TRUE -notification TRUE -drain_timeout 120 -stopoption IMMEDIATE"
    CUR=$(srvctl config service -db "$DBUN" -service health 2>/dev/null || true)
    if [ -z "$CUR" ]; then
      srvctl add service -db "$DBUN" -service health -pdb "$PDB" -preferred "$INSTS" $AC
      srvctl start service -db "$DBUN" -service health
      echo CHANGED
    elif ! echo "$CUR" | grep -qi 'Failover type: *AUTO'; then
      srvctl modify service -db "$DBUN" -service health $AC
      srvctl modify service -db "$DBUN" -service health -modifyconfig -preferred "$INSTS" || true
      srvctl stop service -db "$DBUN" -service health || true
      srvctl start service -db "$DBUN" -service health
      echo CHANGED
    else
      echo unchanged
    fi
  args: { executable: /bin/bash }
  become: true
  become_user: oracle
  register: svc
  changed_when: "'CHANGED' in svc.stdout"
  failed_when: "svc.rc != 0 or 'ORA-' in svc.stdout"

- name: Register the database services with CMAN (append CMAN to remote_listener)
  ansible.builtin.shell: |
    set -e
    export ORACLE_HOME=$(ls -d /u01/app/oracle/product/*/dbhome_* 2>/dev/null | head -1)
    export ORACLE_SID=$(ps -ef | grep -oE 'ora_pmon_[A-Za-z0-9]+' | head -1 | sed 's/ora_pmon_//')
    export PATH=$ORACLE_HOME/bin:$PATH
    CMAN="(ADDRESS=(PROTOCOL=TCP)(HOST={{ cman_host }})(PORT=1521))"
    CUR=$(printf '%s\n' "set heading off feedback off pages 0 lines 400" \
      "select value from v\$parameter where name='remote_listener';" | sqlplus -s / as sysdba | tr -d ' \n')
    if printf '%s' "$CUR" | grep -q "{{ cman_host }}"; then
      echo "already registered"
    else
      [ -z "$CUR" ] && NEW="$CMAN" || NEW="${CUR},${CMAN}"
      printf '%s\n' "alter system set remote_listener='${NEW}' scope=both sid='*';" \
        "alter system register;" | sqlplus -s / as sysdba
    fi
  args: { executable: /bin/bash }
  become: true
  become_user: oracle
  register: rl
  changed_when: "'already registered' not in rl.stdout"
  failed_when: "'ORA-' in rl.stdout"

- name: Create the app user and the TDM proxy user for Traffic Director Mode
  ansible.builtin.shell: |
    set -e
    export ORACLE_HOME=$(ls -d /u01/app/oracle/product/*/dbhome_* 2>/dev/null | head -1)
    export ORACLE_SID=$(ps -ef | grep -oE 'ora_pmon_[A-Za-z0-9]+' | head -1 | sed 's/ora_pmon_//')
    export PATH=$ORACLE_HOME/bin:$PATH
    DBUN=$(srvctl config database | head -1)
    PDB=$(srvctl config service -db "$DBUN" | awk -F': ' '/Pluggable database name/{print $2; exit}')
    sqlplus -s / as sysdba <<SQL
    whenever sqlerror exit 1
    alter session set container=$PDB;
    declare
      n number;
    begin
      select count(*) into n from dba_users where username='APPUSER';
      if n = 0 then execute immediate q'[create user appuser identified by "{{ appuser_password }}"]'; end if;
      select count(*) into n from dba_users where username='TDM';
      if n = 0 then execute immediate q'[create user tdm identified by "{{ tdm_password }}"]'; end if;
    end;
    /
    grant create session, select_catalog_role to appuser;
    grant create session to tdm;
    alter user appuser grant connect through tdm;
    SQL
  args: { executable: /bin/bash }
  become: true
  become_user: oracle
  register: tdm_users
  changed_when: true
  failed_when: "'ORA-' in tdm_users.stdout"
