---
- name: Reload CMAN configuration
  ansible.builtin.shell: |
    export ORACLE_HOME={{ cman_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    cmctl shutdown -c cman_proxy || true
    # Wait for the instance to fully release; starting too soon races the shutdown
    # and fails with TNS-12537, leaving CMAN down.
    for _ in $(seq 1 15); do
      cmctl show status -c cman_proxy 2>&1 | grep -q 'not yet started' && break
      sleep 1
    done
    # Retry startup in case the listener port is still releasing.
    for _ in $(seq 1 5); do
      out=$(cmctl startup -c cman_proxy 2>&1); echo "$out"
      echo "$out" | grep -qE 'completed successfully|already started' && exit 0
      sleep 2
    done
    exit 1
  args: { executable: /bin/bash }
  become_user: "{{ oracle_user }}"
