---
- name: Install prerequisites
  ansible.builtin.dnf:
    name: [libnsl, libnsl2, unzip, oracle-database-preinstall-19c]
    state: present

# glibc 2.34 on OL9 dropped libpthread_nonshared.a; the 19.3 relink rules still
# reference it. An empty archive satisfies the linker — the symbols are in libc.
- name: Provide empty libpthread_nonshared.a for the OL9 relink
  ansible.builtin.copy:
    dest: /usr/lib64/libpthread_nonshared.a
    content: "!<arch>\n"
    force: false
    mode: "0644"

- name: Create oracle inventory dir
  ansible.builtin.file:
    path: "{{ cman_inventory }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: oinstall
    mode: "0775"

- name: Download client installer
  ansible.builtin.get_url:
    url: "{{ cman_client_par_url }}"
    dest: /tmp/client.zip
    mode: "0644"
    force: false

- name: Unzip installer
  ansible.builtin.unarchive:
    src: /tmp/client.zip
    dest: /tmp
    remote_src: true
    owner: "{{ oracle_user }}"
    creates: /tmp/client/runInstaller

- name: Write client response file
  ansible.builtin.copy:
    dest: /tmp/client.rsp
    owner: "{{ oracle_user }}"
    mode: "0644"
    content: |
      oracle.install.responseFileVersion=/oracle/install/rspfmt_clientinstall_response_schema_v19.0.0
      ORACLE_HOME={{ cman_home }}
      ORACLE_BASE=/opt/oracle
      oracle.install.client.installType=Custom
      oracle.install.client.customComponents="oracle.network.cman:19.0.0.0.0"
      INVENTORY_LOCATION={{ cman_inventory }}
      oracle.install.IsBuiltInAccount=false
      UNIX_GROUP_NAME=oinstall

- name: Silent install client (idempotent on ORACLE_HOME presence)
  ansible.builtin.command:
    cmd: /tmp/client/runInstaller -silent -responseFile /tmp/client.rsp -waitforcompletion -ignorePrereqFailure
    creates: "{{ cman_home }}/bin/cmctl"
  become_user: "{{ oracle_user }}"
  environment:
    CV_ASSUME_DISTID: OL8
  register: client_install
  # runInstaller exits 6 on "success with warnings" (optional prereqs); only treat other codes as failure.
  changed_when: client_install.rc | default(0) in [0, 6]
  failed_when: client_install.rc | default(0) not in [0, 6]

- name: Register the central inventory (orainstRoot.sh, first run only)
  ansible.builtin.command:
    cmd: "{{ cman_inventory }}/orainstRoot.sh"
    creates: /etc/oraInst.loc

- name: Configure the host firewall (open CMAN port; reject outbound TCPS so CMAN uses TCP)
  ansible.builtin.shell: |
    firewall-cmd --permanent --add-port=1521/tcp
    # Each DB instance offers CMAN a TCPS:2484 handler alongside TCP:1521, and the TCPS
    # gateway handshake stalls ~60s. Reject outbound 2484 with a TCP reset so the TCPS
    # attempt fails instantly and CMAN falls back to the TCP handler.
    firewall-cmd --permanent --direct --add-rule ipv4 filter OUTPUT 0 -p tcp --dport 2484 -j REJECT --reject-with tcp-reset
    firewall-cmd --reload
  changed_when: true

- name: Create the CMAN wallet directory
  ansible.builtin.file:
    path: "{{ cman_wallet_dir }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: oinstall
    mode: "0700"

# Auto-login (cwallet.sso) SEPS wallet keyed by the database service. CMAN reads it at
# runtime and connects to the database as the tdm proxy user for proxy authentication.
- name: Build the SEPS wallet with the TDM proxy credential
  ansible.builtin.shell: |
    set -e
    export ORACLE_HOME={{ cman_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    WP='{{ tdm_password }}'
    if [ ! -f {{ cman_wallet_dir }}/ewallet.p12 ]; then
      printf '%s\n%s\n' "$WP" "$WP" | mkstore -wrl {{ cman_wallet_dir }} -create
    fi
    printf '%s\n' "$WP" | mkstore -wrl {{ cman_wallet_dir }} -deleteCredential '{{ service_name }}' 2>/dev/null || true
    printf '%s\n' "$WP" | mkstore -wrl {{ cman_wallet_dir }} -createCredential '{{ service_name }}' tdm '{{ tdm_password }}'
  args: { executable: /bin/bash }
  become_user: "{{ oracle_user }}"
  register: wallet
  changed_when: true
  failed_when: wallet.rc != 0

- name: Deploy cman.ora
  ansible.builtin.template:
    src: cman.ora.j2
    dest: "{{ cman_home }}/network/admin/cman.ora"
    owner: "{{ oracle_user }}"
    group: oinstall
    mode: "0644"
  notify: Reload CMAN configuration

# Two roles: <events>true</events> lets CMAN consume FAN (service DOWN/UP + drain) and runtime load
# balancing; the <session_pool> turns on PRCP so CMAN keeps a pool of warm backend gateway sessions
# to the service. min_size keeps warm sessions even when idle, so a restored/surviving RAC node is
# never cold — a smart client (SERVER=POOLED) checks out a warm session instead of building a slow
# TDM gateway, which is what removes the post-drain UCP-29 borrow storm.
- name: Deploy oraaccess.xml (FAN events + PRCP warm-backend pool)
  ansible.builtin.copy:
    dest: "{{ cman_home }}/network/admin/oraaccess.xml"
    owner: "{{ oracle_user }}"
    group: oinstall
    mode: "0644"
    content: |
      <?xml version="1.0"?>
      <oraaccess xmlns="http://xmlns.oracle.com/oci/oraaccess"
                 xmlns:oci="http://xmlns.oracle.com/oci/oraaccess"
                 schemaLocation="http://xmlns.oracle.com/oci/oraaccess
                 http://xmlns.oracle.com/oci/oraaccess.xsd">
        <default_parameters>
          <events>true</events>
        </default_parameters>
        <config_descriptions>
          <config_description>
            <config_alias>tdm_pooled</config_alias>
            <parameters>
              <session_pool>
                <enable>true</enable>
                <min_size>8</min_size>
                <max_size>32</max_size>
                <increment>2</increment>
              </session_pool>
            </parameters>
          </config_description>
        </config_descriptions>
        <connection_configs>
          <connection_config>
            <connection_string>{{ service_name }}</connection_string>
            <config_alias>tdm_pooled</config_alias>
          </connection_config>
        </connection_configs>
      </oraaccess>
  notify: Reload CMAN configuration

- name: Start CMAN proxy
  ansible.builtin.shell: |
    export ORACLE_HOME={{ cman_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    cmctl startup -c cman_proxy
  args: { executable: /bin/bash }
  become_user: "{{ oracle_user }}"
  register: cmctl_out
  changed_when: "'successfully' in (cmctl_out.stdout | lower)"
  # cmctl returns rc 0 even when the instance fails to start; TNS-04012 is the real failure signal.
  failed_when: "'TNS-04012' in cmctl_out.stdout"
